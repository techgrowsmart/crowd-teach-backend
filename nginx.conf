# Nginx Configuration for GoGrowSmart Backend
# Place at /etc/nginx/nginx.conf or /etc/nginx/sites-available/gogrowsmart

events {
    worker_connections 1024;
}

http {
    upstream backend {
        server 127.0.0.1:3000;  # Backend runs on port 3000 internally
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name growsmartserver.gogrowsmart.com;
        
        # Redirect all HTTP traffic to HTTPS
        return 301 https://$server_name$request_uri;
    }

    # HTTPS main server
    server {
        listen 443 ssl http2;
        server_name growsmartserver.gogrowsmart.com;

        # SSL Configuration
        ssl_certificate /home/ec2-user/certs/fullchain.pem;
        ssl_certificate_key /home/ec2-user/certs/privkey.pem;
        
        # SSL Security Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # CORS Headers
        add_header 'Access-Control-Allow-Origin' 'https://portal.gogrowsmart.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Test-User,Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Security Headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Backend Proxy Configuration
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Handle preflight OPTIONS requests
        location @options {
            add_header 'Access-Control-Allow-Origin' 'https://portal.gogrowsmart.com';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Test-User,Origin';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # If method is OPTIONS, redirect to @options
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # File upload size limit
        client_max_body_size 50M;

        # Logging
        access_log /var/log/nginx/gogrowsmart_access.log;
        error_log /var/log/nginx/gogrowsmart_error.log;
    }
}
